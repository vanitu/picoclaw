# PicoClaw - Docker Compose (Development)
# Quick start for local development and testing
#
# IMPORTANT: All webhook channels share the SAME port!
# The Gateway HTTP server routes requests by path:
#   /krabot/*    - Krabot WebSocket (e.g., /krabot/ws)
#   /a2a/*       - A2A protocol (e.g., /a2a, /a2a/stream, /a2a/tasks/)
#   /.well-known/agent.json - A2A agent discovery
#   /health      - Health check endpoint
#
# Usage:
#   cd docker && docker compose up
#   # or from project root:
#   docker compose -f docker/docker-compose.yml up
#
networks:
  krabot-bots:
    driver: bridge
    name: krabot-bots # fixed name so krabot_local_manager/cli can attach containers

services:
  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: picoclaw:dev
    container_name: picoclaw-gateway
    restart: unless-stopped
    networks:
      - krabot-bots # krabot containers can reach this service for LLM requests
    ports:
      # Gateway default port (18790) - all channels share this port
      - "18790:18790"
    volumes:
      - ./config:/config
      - picoclaw-data:/data
    environment:
      - PICOCLAW_CONFIG=/config/config.json
      - PICOCLAW_HOME=/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18790/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  picoclaw-data:
    driver: local
