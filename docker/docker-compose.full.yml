# PicoClaw - Docker Compose (Full Setup)
# Complete setup with gateway, agent, and optional launcher
#
# IMPORTANT: All webhook channels share the SAME port!
# The Gateway HTTP server routes requests by path:
#   /krabot/*    - Krabot WebSocket (e.g., /krabot/ws)
#   /a2a/*       - A2A protocol (e.g., /a2a, /a2a/stream, /a2a/tasks/)
#   /.well-known/agent.json - A2A agent discovery
#   /health      - Health check endpoint
#
# Usage:
#   cd docker && docker compose -f docker-compose.full.yml up
#   # With launcher UI:
#   cd docker && docker compose -f docker-compose.full.yml --profile launcher up

services:
  # Main gateway service - serves ALL webhook channels on one port
  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: picoclaw:dev
    container_name: picoclaw-gateway
    restart: unless-stopped
    ports:
      # Gateway port (18790) - shared by Krabot, A2A, and other channels
      # Both channels work simultaneously on different paths:
      #   ws://localhost:18790/krabot/ws
      #   http://localhost:18790/a2a
      #   http://localhost:18790/.well-known/agent.json
      - "18790:18790"
    volumes:
      - ./config:/config
      - picoclaw-data:/data
    environment:
      - PICOCLAW_CONFIG=/config/config.json
      - PICOCLAW_HOME=/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
    command: ["picoclaw", "gateway"]
    networks:
      - picoclaw
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18790/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Agent worker service
  picoclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: picoclaw:dev
    container_name: picoclaw-agent
    restart: unless-stopped
    volumes:
      - ./config:/config
      - picoclaw-data:/data
    environment:
      - PICOCLAW_CONFIG=/config/config.json
      - PICOCLAW_HOME=/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
    command: ["picoclaw", "agent"]
    networks:
      - picoclaw
    depends_on:
      picoclaw-gateway:
        condition: service_healthy
    # Agent doesn't expose ports but needs to communicate with gateway

  # Launcher with Web UI (optional profile)
  picoclaw-launcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: picoclaw:dev
    container_name: picoclaw-launcher
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config:/config
      - picoclaw-data:/data
    environment:
      - PICOCLAW_CONFIG=/config/config.json
      - PICOCLAW_HOME=/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
    command: ["picoclaw-launcher"]
    networks:
      - picoclaw
    profiles:
      - launcher
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  picoclaw:
    driver: bridge

volumes:
  picoclaw-data:
    driver: local
